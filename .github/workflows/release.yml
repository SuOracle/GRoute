name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dhttp.proxyHost= -Dhttps.proxyHost="

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Strip any proxy settings from gradle.properties
        run: |
          for f in gradle.properties gradle/gradle.properties gradle/gradle-daemon-jvm.properties; do
            if [ -f "$f" ]; then
              sed -i '/proxyHost/d; /proxyPort/d' "$f"
            fi
          done

      - name: Create local.properties
        run: |
          echo "DONATION_CARD_NUMBER=${{ secrets.DONATION_CARD_NUMBER }}" >> local.properties
          echo "DONATION_CARD_HOLDER=${{ secrets.DONATION_CARD_HOLDER }}" >> local.properties

      - name: Create secrets.properties
        run: |
          echo "DEFAULT_SUB_URL=${{ secrets.DEFAULT_SUB_URL }}" >> secrets.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GRoute-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload mapping file
        uses: actions/upload-artifact@v4
        with:
          name: mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up secrets from runner
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks" local.properties secrets.properties
